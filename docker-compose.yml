
services:
  # --- FRONTEND ---
  frontend:
    build: 
      context: ./holiday_booking_fe
      args:
        - VITE_API_URL=http://localhost:7000
    container_name: react_frontend-2
    ports:
      - "5173:80"

  backend:
    build: ./holiday_booking_be
    container_name: spring_backend
    ports:
      - "7000:7000"
    environment:
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
